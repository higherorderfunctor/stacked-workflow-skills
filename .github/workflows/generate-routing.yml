name: Generate Instructions

on:
  push:
    branches: [main]
    paths:
      - "fragments/**"
      - "lib/fragments.nix"
  workflow_dispatch:

concurrency:
  group: generate-instructions
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Generate instruction files
        run: nix run .#generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && test -z "$(git status --porcelain)"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/generate-instructions
          commit-message: "chore(ci): regenerate instruction files"
          title: "chore(ci): regenerate instruction files"
          body: |
            Automated regeneration of instruction files from `fragments/`
            source via `nix run .#generate`.

            Review the diffs to verify content accuracy.
          labels: automated
