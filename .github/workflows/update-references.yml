name: Update References

on:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: update-references
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

# TODO: remove once DeterminateSystems/nix-installer-action ships node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Re-index reference docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          nix develop --command claude --print \
            "/index-repo-docs arxanas/git-branchless references/git-branchless.md" \
            "/index-repo-docs tummychow/git-absorb references/git-absorb.md" \
            "/index-repo-docs mystor/git-revise references/git-revise.md"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && test -z "$(git status --porcelain)"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/update-references
          commit-message: "docs(references): update upstream reference docs"
          title: "docs(references): update upstream reference docs"
          body: |
            Automated weekly re-index of reference docs via `/index-repo-docs`.

            Review the diffs to verify no regressions in distilled content.
          labels: automated
